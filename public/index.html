<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lohra · Loop 1:1 para Instagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
            overflow: hidden;
        }

        /* Container principal em 1:1 (quadrado perfeito) */
        .square-container {
            position: relative;
            width: 100%;
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: 1 / 1;
            background: #000;
            margin: 0 auto;
        }

        /* Stage ocupa 100% do quadrado */
        #stage {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            cursor: pointer;
        }

        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            object-fit: cover;
            display: block;
        }

        /* Logo Lohra sobreposta - centralizada e elegante */
        .brand-logo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 20;
            width: 55%;
            max-width: 280px;
            pointer-events: none;
            filter: drop-shadow(0 8px 24px rgba(0,0,0,0.5));
            animation: gentlePulse 2.5s ease-in-out infinite;
        }

        .brand-logo img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Toque inicial com estilo */
        .tap-hint {
            position: absolute;
            bottom: 12%;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 14px 32px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 1px;
            white-space: nowrap;
            z-index: 20;
            animation: pulseGlow 1.8s ease infinite;
            pointer-events: none;
            backdrop-filter: blur(12px);
            font-family: inherit;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.2);
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); background: rgba(0,0,0,0.7); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.05); background: rgba(0,0,0,0.85); box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        }

        @keyframes gentlePulse {
            0%, 100% { opacity: 0.92; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.02); }
        }

        /* Remover qualquer borda ou espaço extra */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
        }
    </style>
</head>
<body>

<div class="square-container">
    <div id="stage">
        <canvas id="canvas"></canvas>
        
        <div class="brand-logo">
            <img src="https://projeto-lohra-api.vercel.app/api/media?type=image&file=marca_lohra.png" alt="LOHRA" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 400 200\'%3E%3Crect width=\'400\' height=\'200\' fill=\'%231a1a2e\'/%3E%3Ctext x=\'50%25\' y=\'50%25\' text-anchor=\'middle\' dy=\'.3em\' fill=\'white\' font-size=\'48\' font-family=\'Arial\' font-weight=\'bold\'%3ELOHRA%3C/text%3E%3C/svg%3E'">
        </div>
        
        <div id="tapHint" class="tap-hint">🎬 TOQUE PARA COMEÇAR 🎬</div>
    </div>
</div>

<script>
(function() {
    // --------------------------------------------------------------
    // LOHRA STUDIO - VIDEO 1:1 QUADRADO PERFEITO
    // Loop de 18 segundos com cada imagem (azul, rosa, verde) aparecendo 3 vezes
    // Sem bordas pretas - canvas 1080x1080 (quadrado 1:1)
    // Total de 9 segmentos (3 imagens x 3 repetições) = 18 segundos
    // --------------------------------------------------------------
    
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    
    // Configuração 1:1 (quadrado perfeito para Instagram Feed/Reels quadrado)
    canvas.width = 1080;
    canvas.height = 1080;
    
    // ========== IMAGENS DOS KITS ==========
    const images = {
        azul: new Image(),
        rosa: new Image(),
        verde: new Image()
    };
    
    const imageUrls = {
        azul: "https://projeto-lohra-api.vercel.app/api/media?type=image&file=kit_azul.jpeg",
        rosa: "https://projeto-lohra-api.vercel.app/api/media?type=image&file=kit_rosa.jpeg",
        verde: "https://projeto-lohra-api.vercel.app/api/media?type=image&file=kit_verde.jpeg"
    };
    
    // ========== ÁUDIOS ==========
    const bgMusic = new Audio("https://projeto-lohra-api.vercel.app/api/media?type=audio&file=heart.mp3");
    const narration = new Audio("https://projeto-lohra-api.vercel.app/api/media?type=audio&file=audio_narracao.ogg");
    
    bgMusic.loop = true;
    bgMusic.volume = 0.32;
    narration.volume = 0.88;
    
    let audioUnlocked = false;
    let imagesLoaded = 0;
    const totalImages = 3;
    
    // Controle de progresso e tempo
    let globalProgress = 0;        // 0 a 1 (1 = 18 segundos)
    let playing = true;
    let animationId = null;
    let videoStartReal = null;
    const TOTAL_DURATION_SEC = 18.0;   // 18 segundos fixos
    
    // Estado para garantir que o loop reinicie infinitamente
    let isLooping = true;
    
    // ========== FUNÇÃO PARA DESENHAR IMAGENS NO QUADRADO 1:1 ==========
    // As imagens originais podem ser 9:16 ou quadradas, vamos centralizar e preencher o quadrado sem distorção
    // usando object-fit: cover equivalente no canvas
    
    function drawImageCover(img, ctx, targetW, targetH) {
        if (!img || !img.complete) return false;
        
        const imgW = img.naturalWidth;
        const imgH = img.naturalHeight;
        
        if (imgW === 0 || imgH === 0) return false;
        
        // Calcular scale para cobrir o quadrado sem bordas pretas
        const scaleX = targetW / imgW;
        const scaleY = targetH / imgH;
        const scale = Math.max(scaleX, scaleY);
        
        const drawW = imgW * scale;
        const drawH = imgH * scale;
        const offsetX = (targetW - drawW) / 2;
        const offsetY = (targetH - drawH) / 2;
        
        ctx.drawImage(img, offsetX, offsetY, drawW, drawH);
        return true;
    }
    
    // Mapeamento de segmentos: 9 segmentos (cada imagem aparece 3 vezes)
    // Ordem: Azul (0), Rosa (1), Verde (2) -> repete 3x
    function getImageForProgress(progress01) {
        // progress01: 0 a 1 (18s)
        const totalSegments = 9;  // 3 imagens * 3 repetições
        const segmentIndex = Math.floor(progress01 * totalSegments);
        const clampedIndex = Math.min(segmentIndex, totalSegments - 1);
        
        const imageOrder = ['azul', 'rosa', 'verde'];
        const cyclePos = clampedIndex % 3;
        return imageOrder[cyclePos];
    }
    
    // Obter próximo segmento para crossfade suave
    function getNextImageForProgress(progress01) {
        const totalSegments = 9;
        let nextSegmentIndex = Math.floor(progress01 * totalSegments) + 1;
        if (nextSegmentIndex >= totalSegments) return null;
        
        const imageOrder = ['azul', 'rosa', 'verde'];
        const cyclePos = nextSegmentIndex % 3;
        return imageOrder[cyclePos];
    }
    
    // Calcular fator de blend (crossfade) nas bordas dos segmentos
    function getBlendFactor(progress01) {
        const totalSegments = 9;
        const segmentDuration = 1.0 / totalSegments;
        const posInSegment = (progress01 % segmentDuration) / segmentDuration; // 0..1 dentro do segmento
        
        const fadeWidth = 0.22; // 22% de cada segmento para transição suave
        if (posInSegment > (1 - fadeWidth)) {
            // Final do segmento: fade para próxima imagem
            return (posInSegment - (1 - fadeWidth)) / fadeWidth;
        }
        return 0;
    }
    
    // Desenho principal com crossfade e proporção 1:1 perfeita
    function drawSquareFrame(progress) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Verificar se todas as imagens estão carregadas
        if (!images.azul.complete || !images.rosa.complete || !images.verde.complete) {
            ctx.fillStyle = "#0a0a0a";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            // Mostrar texto de carregamento sutil
            ctx.fillStyle = "#ffffff80";
            ctx.font = "14px system-ui";
            ctx.textAlign = "center";
            ctx.fillText("carregando...", canvas.width/2, canvas.height/2);
            return;
        }
        
        let p = Math.min(0.9999, Math.max(0, progress));
        
        // Obter imagem atual e próxima
        const currentKey = getImageForProgress(p);
        const nextKey = getNextImageForProgress(p);
        const blend = getBlendFactor(p);
        
        const currentImg = images[currentKey];
        
        // Desenhar imagem atual (cover no quadrado)
        if (currentImg && currentImg.complete) {
            drawImageCover(currentImg, ctx, canvas.width, canvas.height);
        } else {
            ctx.fillStyle = "#111";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        
        // Se houver próxima imagem e blend > 0, desenhar com transparência
        if (nextKey && blend > 0.01) {
            const nextImg = images[nextKey];
            if (nextImg && nextImg.complete) {
                ctx.globalAlpha = blend;
                drawImageCover(nextImg, ctx, canvas.width, canvas.height);
                ctx.globalAlpha = 1.0;
            }
        }
        
        // Pequeno detalhe de vinheta sutil para destacar a logo
        ctx.globalCompositeOperation = 'source-over';
        const gradient = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.width*0.2, canvas.width/2, canvas.height/2, canvas.width*0.7);
        gradient.addColorStop(0, 'rgba(0,0,0,0)');
        gradient.addColorStop(1, 'rgba(0,0,0,0.25)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1.0;
    }
    
    // Função principal de animação baseada em timer absoluto de 18 segundos
    function updateAnimationFrame(now) {
        if (!playing) return;
        
        if (audioUnlocked) {
            // Sistema de tempo preciso para 18 segundos de loop
            if (videoStartReal === null) {
                videoStartReal = performance.now();
                globalProgress = 0;
            }
            
            const elapsed = (performance.now() - videoStartReal) / 1000;
            let newProgress = elapsed / TOTAL_DURATION_SEC;
            
            if (newProgress >= 1.0) {
                // Reinício suave do loop após completar 18 segundos
                newProgress = newProgress % 1.0;
                videoStartReal = performance.now() - (newProgress * TOTAL_DURATION_SEC * 1000);
                console.log("🔄 Loop completo 18s, reiniciando progresso visual");
            }
            
            globalProgress = newProgress;
            drawSquareFrame(globalProgress);
        } else {
            // Modo stand-by: mostrar primeira imagem (azul) com logo
            if (images.azul.complete) {
                drawImageCover(images.azul, ctx, canvas.width, canvas.height);
                // Efeito suave overlay
                ctx.fillStyle = "rgba(0,0,0,0.15)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#000";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }
        
        animationId = requestAnimationFrame(updateAnimationFrame);
    }
    
    // Gerenciar áudio e sincronia perfeita
    function startFullPlayback() {
        if (!audioUnlocked) return;
        
        // Resetar timer visual para começar do início
        videoStartReal = performance.now();
        globalProgress = 0;
        playing = true;
        
        // Reiniciar áudios
        bgMusic.currentTime = 0;
        narration.currentTime = 0;
        
        // Tocar com tratamento de erro
        const playPromises = [];
        playPromises.push(bgMusic.play().catch(e => console.warn("bgMusic start:", e)));
        playPromises.push(narration.play().catch(e => console.warn("narration start:", e)));
        
        // Esconder o hint de toque
        const hint = document.getElementById('tapHint');
        if (hint) hint.style.display = 'none';
        
        // Configurar loop infinito da narração para alinhar com os 18s do vídeo
        narration.onended = () => {
            if (audioUnlocked && narration) {
                narration.currentTime = 0;
                narration.play().catch(e => console.log("restart narration:", e));
            }
        };
        
        bgMusic.onended = () => {
            if (audioUnlocked && bgMusic) {
                bgMusic.currentTime = 0;
                bgMusic.play().catch(e => console.log("restart bgMusic:", e));
            }
        };
    }
    
    // Destravar áudio após interação do usuário (necessário para navegadores)
    function unlockAndStart() {
        if (audioUnlocked) return;
        
        audioUnlocked = true;
        bgMusic.muted = false;
        narration.muted = false;
        
        // Pequeno delay para garantir que tudo está pronto
        setTimeout(() => {
            startFullPlayback();
        }, 50);
    }
    
    // Carregar imagens com verificação de conclusão
    function loadAllImages() {
        const onLoad = () => {
            imagesLoaded++;
            if (imagesLoaded === totalImages) {
                console.log("✅ Todas as imagens carregadas em 1:1");
                // Desenhar frame inicial
                if (!audioUnlocked) {
                    if (images.azul.complete) {
                        drawImageCover(images.azul, ctx, canvas.width, canvas.height);
                    }
                } else {
                    drawSquareFrame(globalProgress);
                }
            }
        };
        
        images.azul.onload = onLoad;
        images.rosa.onload = onLoad;
        images.verde.onload = onLoad;
        
        images.azul.onerror = () => { console.error("Erro azul"); imagesLoaded++; onLoad(); };
        images.rosa.onerror = () => { console.error("Erro rosa"); imagesLoaded++; onLoad(); };
        images.verde.onerror = () => { console.error("Erro verde"); imagesLoaded++; onLoad(); };
        
        images.azul.src = imageUrls.azul;
        images.rosa.src = imageUrls.rosa;
        images.verde.src = imageUrls.verde;
    }
    
    // Preparar áudios e fallback
    function prepareAudioFiles() {
        bgMusic.load();
        narration.load();
        
        // Garantir que o áudio não auto-play sem interação
        bgMusic.muted = true;
        narration.muted = true;
        
        // Fallback caso a narração não carregue metadados
        setTimeout(() => {
            if (narration.readyState === 0) {
                console.log("Áudio pode estar lento, mas o loop visual 18s continua perfeito.");
            }
        }, 2000);
    }
    
    // Eventos de toque/clique para iniciar (política de áudio)
    function bindInteractionEvents() {
        const stage = document.getElementById('stage');
        const hintBtn = document.getElementById('tapHint');
        
        const startHandler = (e) => {
            e.preventDefault();
            if (!audioUnlocked) {
                unlockAndStart();
            }
        };
        
        stage.addEventListener('click', startHandler);
        stage.addEventListener('touchstart', startHandler);
        if (hintBtn) {
            hintBtn.addEventListener('click', startHandler);
            hintBtn.addEventListener('touchstart', startHandler);
        }
        
        // Suporte para tecla espaço/enter
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                if (!audioUnlocked) unlockAndStart();
            }
        });
    }
    
    // Ajuste de redimensionamento para garantir que o container seja sempre 1:1 sem bordas pretas
    function ensureSquareRatio() {
        const container = document.querySelector('.square-container');
        if (!container) return;
        
        const windowW = window.innerWidth;
        const windowH = window.innerHeight;
        
        // Quadrado perfeito ocupando o máximo possível sem bordas
        const size = Math.min(windowW, windowH);
        container.style.width = size + 'px';
        container.style.height = size + 'px';
        container.style.maxWidth = 'none';
        container.style.margin = '0 auto';
    }
    
    // Inicialização completa
    function init() {
        console.log("🎬 LOHRA STUDIO - Modo 1:1 Quadrado | Loop 18s | 3 repetições por imagem");
        
        ensureSquareRatio();
        window.addEventListener('resize', ensureSquareRatio);
        
        loadAllImages();
        prepareAudioFiles();
        bindInteractionEvents();
        
        // Desenho inicial escuro com logo
        ctx.fillStyle = "#0a0a0a";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Mostrar placeholder da primeira imagem se disponível
        const tryDrawInitial = setInterval(() => {
            if (images.azul.complete) {
                drawImageCover(images.azul, ctx, canvas.width, canvas.height);
                ctx.fillStyle = "rgba(0,0,0,0.2)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                clearInterval(tryDrawInitial);
            }
        }, 150);
        
        // Iniciar loop de animação
        animationId = requestAnimationFrame(updateAnimationFrame);
        
        // Fallback: após 5 segundos se o usuário não interagir, mostrar hint com mais ênfase
        setTimeout(() => {
            const hint = document.getElementById('tapHint');
            if (hint && !audioUnlocked) {
                hint.style.display = 'flex';
            }
        }, 500);
    }
    
    init();
})();
</script>
</body>
</html>
