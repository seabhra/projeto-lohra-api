<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lohra · Tela Cheia · YouTube/Instagram</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000000;
            overflow: hidden;
            position: fixed;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
        }

        /* Container ocupando 100% da tela SEM bordas pretas */
        .fullscreen-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #stage {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            cursor: pointer;
        }

        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            object-fit: cover;
            display: block;
        }

        /* Logo da marca centralizada no topo - exatamente top: 120px */
        .brand-logo {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            width: 280px;
            max-width: 55%;
            pointer-events: none;
            filter: drop-shadow(0 4px 20px rgba(0,0,0,0.4));
        }

        .brand-logo img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Botão de toque inicial elegante */
        .tap-hint {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 14px 36px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1.5px;
            white-space: nowrap;
            z-index: 30;
            animation: pulseGlow 1.6s ease infinite;
            pointer-events: none;
            backdrop-filter: blur(16px);
            font-family: inherit;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.25);
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); background: rgba(0,0,0,0.7); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.04); background: rgba(0,0,0,0.85); box-shadow: 0 0 25px rgba(255,255,255,0.15); }
        }

        /* Garantia de que não há scroll ou espaços extras */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

<div class="fullscreen-container">
    <div id="stage">
        <canvas id="canvas"></canvas>
        
        <!-- Logo da marca centralizada no topo (top: 120px) conforme solicitado -->
        <div class="brand-logo">
            <img src="/images/marca.png" alt="LOHRA" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 400 120\'%3E%3Crect width=\'400\' height=\'120\' fill=\'%231a1a2e\'/%3E%3Ctext x=\'50%25\' y=\'50%25\' text-anchor=\'middle\' dy=\'.3em\' fill=\'white\' font-size=\'36\' font-family=\'Arial\' font-weight=\'bold\'%3ELOHRA%3C/text%3E%3C/svg%3E'">
        </div>
        
        <div id="tapHint" class="tap-hint">🎬 TOQUE PARA COMEÇAR 🎬</div>
    </div>
</div>

<script>
(function() {
    // =================================================================
    // LOHRA STUDIO - TELA CHEIA SEM BORDAS PRETAS
    // O vídeo ocupa 100% da tela (object-fit: cover no canvas)
    // Logo centralizada no topo (top: 120px)
    // Sem marca d'água extra - apenas a logo solicitada
    // Loop de 18 segundos - Cada imagem (Azul, Rosa, Verde) aparece 3 vezes
    // =================================================================
    
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    
    // Função para ajustar o canvas ao tamanho real da tela
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        // Redesenhar após resize
        if (images.azul.complete && images.rosa.complete && images.verde.complete) {
            drawFullscreenFrame(globalProgress);
        }
    }
    
    // ========== IMAGENS DOS KITS (Azul, Rosa, Verde) ==========
    const images = {
        azul: new Image(),
        rosa: new Image(),
        verde: new Image()
    };
    
    const imageUrls = {
        azul: "https://projeto-lohra-api.vercel.app/api/media?type=image&file=kit_azul.jpeg",
        rosa: "https://projeto-lohra-api.vercel.app/api/media?type=image&file=kit_rosa.jpeg",
        verde: "https://projeto-lohra-api.vercel.app/api/media?type=image&file=kit_verde.jpeg"
    };
    
    // ========== ÁUDIOS ==========
    const bgMusic = new Audio("https://projeto-lohra-api.vercel.app/api/media?type=audio&file=heart.mp3");
    const narration = new Audio("https://projeto-lohra-api.vercel.app/api/media?type=audio&file=audio_narracao.ogg");
    
    bgMusic.loop = true;
    bgMusic.volume = 0.3;
    narration.volume = 0.85;
    
    let audioUnlocked = false;
    let imagesLoadedCount = 0;
    const totalImagesToLoad = 3;
    
    // Controle do progresso e tempo para 18 segundos exatos
    let globalProgress = 0;           // 0 a 1 (1 = 18 segundos)
    let playing = true;
    let animationId = null;
    let videoStartTime = null;         // Timestamp de início absoluto
    const TOTAL_DURATION_SEC = 18.0;   // 18 segundos fixos para o loop completo
    
    // ========== FUNÇÃO PARA DESENHAR IMAGEM EM TELA CHEIA (COVER) ==========
    // Remove qualquer borda preta - a imagem cobre 100% da tela
    function drawImageFullCover(img, ctx, targetW, targetH) {
        if (!img || !img.complete) return false;
        
        const imgW = img.naturalWidth;
        const imgH = img.naturalHeight;
        
        if (imgW === 0 || imgH === 0) return false;
        
        // Calcular scale para cobrir completamente a tela (como object-fit: cover)
        const scaleX = targetW / imgW;
        const scaleY = targetH / imgH;
        const scale = Math.max(scaleX, scaleY);
        
        const drawW = imgW * scale;
        const drawH = imgH * scale;
        const offsetX = (targetW - drawW) / 2;
        const offsetY = (targetH - drawH) / 2;
        
        ctx.drawImage(img, offsetX, offsetY, drawW, drawH);
        return true;
    }
    
    // Mapeamento dos segmentos: 9 segmentos (3 imagens × 3 repetições = 9 aparições)
    // Ordem cíclica: Azul -> Rosa -> Verde -> Azul -> Rosa -> Verde -> Azul -> Rosa -> Verde
    function getImageKeyByProgress(progress01) {
        const totalSegments = 9;
        let segmentIndex = Math.floor(progress01 * totalSegments);
        if (segmentIndex >= totalSegments) segmentIndex = totalSegments - 1;
        if (segmentIndex < 0) segmentIndex = 0;
        
        const imageOrder = ['azul', 'rosa', 'verde'];
        const cyclePosition = segmentIndex % 3;
        return imageOrder[cyclePosition];
    }
    
    // Obter próxima imagem para transição suave (crossfade)
    function getNextImageKey(progress01) {
        const totalSegments = 9;
        let nextSegmentIndex = Math.floor(progress01 * totalSegments) + 1;
        if (nextSegmentIndex >= totalSegments) return null;
        
        const imageOrder = ['azul', 'rosa', 'verde'];
        const cyclePos = nextSegmentIndex % 3;
        return imageOrder[cyclePos];
    }
    
    // Calcular fator de crossfade entre imagens (transições suaves)
    function getCrossfadeFactor(progress01) {
        const totalSegments = 9;
        const segmentDuration = 1.0 / totalSegments;
        const posInSegment = (progress01 % segmentDuration) / segmentDuration;
        
        const fadeWidth = 0.22; // 22% de cada segmento para fade suave
        if (posInSegment > (1 - fadeWidth)) {
            return (posInSegment - (1 - fadeWidth)) / fadeWidth;
        }
        return 0;
    }
    
    // Desenho principal em tela cheia (sem bordas pretas)
    function drawFullscreenFrame(progress) {
        const w = canvas.width;
        const h = canvas.height;
        
        ctx.clearRect(0, 0, w, h);
        
        // Verificar se todas as imagens estão carregadas
        if (!images.azul.complete || !images.rosa.complete || !images.verde.complete) {
            ctx.fillStyle = "#050505";
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = "#ffffff80";
            ctx.font = "18px system-ui";
            ctx.textAlign = "center";
            ctx.fillText("Carregando...", w/2, h/2);
            return;
        }
        
        let p = Math.min(0.99999, Math.max(0, progress));
        
        const currentKey = getImageKeyByProgress(p);
        const nextKey = getNextImageKey(p);
        const blend = getCrossfadeFactor(p);
        
        const currentImg = images[currentKey];
        
        // Desenhar imagem atual cobrindo toda a tela
        if (currentImg && currentImg.complete) {
            drawImageFullCover(currentImg, ctx, w, h);
        } else {
            ctx.fillStyle = "#000000";
            ctx.fillRect(0, 0, w, h);
        }
        
        // Aplicar crossfade com a próxima imagem se houver
        if (nextKey && blend > 0.01) {
            const nextImg = images[nextKey];
            if (nextImg && nextImg.complete) {
                ctx.globalAlpha = blend;
                drawImageFullCover(nextImg, ctx, w, h);
                ctx.globalAlpha = 1.0;
            }
        }
        
        // Vinheta sutil apenas para dar profundidade (opcional, não é watermark)
        ctx.globalCompositeOperation = 'source-over';
        const gradient = ctx.createRadialGradient(w/2, h/2, w*0.3, w/2, h/2, w*0.8);
        gradient.addColorStop(0, 'rgba(0,0,0,0)');
        gradient.addColorStop(1, 'rgba(0,0,0,0.15)');
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, w, h);
        ctx.globalAlpha = 1.0;
    }
    
    // ========== LOOP PRINCIPAL COM TEMPO ABSOLUTO (18 SEGUNDOS) ==========
    function animationLoop(timestamp) {
        if (!playing) {
            animationId = requestAnimationFrame(animationLoop);
            return;
        }
        
        if (audioUnlocked) {
            // Timer absoluto baseado em performance para garantir exatos 18 segundos por ciclo
            if (videoStartTime === null) {
                videoStartTime = performance.now();
                globalProgress = 0;
            }
            
            const elapsedSeconds = (performance.now() - videoStartTime) / 1000;
            let newProgress = elapsedSeconds / TOTAL_DURATION_SEC;
            
            if (newProgress >= 1.0) {
                // Reinício suave do loop após completar 18 segundos
                newProgress = newProgress % 1.0;
                videoStartTime = performance.now() - (newProgress * TOTAL_DURATION_SEC * 1000);
                console.log("🔄 Loop de 18s completo - Reiniciando com repetição das 3 imagens");
            }
            
            globalProgress = newProgress;
            drawFullscreenFrame(globalProgress);
        } else {
            // Modo standby: mostrar primeira imagem (azul) com logo, sem áudio
            if (images.azul.complete) {
                drawImageFullCover(images.azul, ctx, canvas.width, canvas.height);
                // Leve overlay escuro para destacar o botão
                ctx.fillStyle = "rgba(0,0,0,0.1)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = "#0a0a0a";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }
        
        animationId = requestAnimationFrame(animationLoop);
    }
    
    // ========== INICIAR PLAYBACK COMPLETO COM ÁUDIO ==========
    function startFullPlayback() {
        if (!audioUnlocked) return;
        
        // Resetar timer visual para começar do início do loop de 18s
        videoStartTime = performance.now();
        globalProgress = 0;
        playing = true;
        
        // Resetar áudios e tocar
        bgMusic.currentTime = 0;
        narration.currentTime = 0;
        
        bgMusic.play().catch(e => console.warn("bgMusic start:", e));
        narration.play().catch(e => console.warn("narration start:", e));
        
        // Esconder hint de toque
        const hint = document.getElementById('tapHint');
        if (hint) hint.style.display = 'none';
        
        // Configurar loop contínuo da narração para alinhar com o vídeo
        narration.onended = () => {
            if (audioUnlocked && narration) {
                narration.currentTime = 0;
                narration.play().catch(e => console.log("reinício narração:", e));
            }
        };
        
        bgMusic.onended = () => {
            if (audioUnlocked && bgMusic) {
                bgMusic.currentTime = 0;
                bgMusic.play().catch(e => console.log("reinício música:", e));
            }
        };
    }
    
    // Destravar áudio por interação do usuário (políticas do navegador)
    function unlockAudioAndStart() {
        if (audioUnlocked) return;
        
        audioUnlocked = true;
        bgMusic.muted = false;
        narration.muted = false;
        
        setTimeout(() => {
            startFullPlayback();
        }, 30);
    }
    
    // ========== CARREGAR IMAGENS ==========
    function loadAllImages() {
        const onImageLoad = () => {
            imagesLoadedCount++;
            if (imagesLoadedCount === totalImagesToLoad) {
                console.log("✅ Todas as imagens carregadas - Tela cheia sem bordas");
                // Desenhar frame inicial
                if (!audioUnlocked && images.azul.complete) {
                    drawImageFullCover(images.azul, ctx, canvas.width, canvas.height);
                }
            }
        };
        
        images.azul.onload = onImageLoad;
        images.rosa.onload = onImageLoad;
        images.verde.onload = onImageLoad;
        
        images.azul.onerror = () => { console.warn("Erro azul"); imagesLoadedCount++; onImageLoad(); };
        images.rosa.onerror = () => { console.warn("Erro rosa"); imagesLoadedCount++; onImageLoad(); };
        images.verde.onerror = () => { console.warn("Erro verde"); imagesLoadedCount++; onImageLoad(); };
        
        images.azul.src = imageUrls.azul;
        images.rosa.src = imageUrls.rosa;
        images.verde.src = imageUrls.verde;
    }
    
    // Preparar áudio com fallback
    function prepareAudio() {
        bgMusic.load();
        narration.load();
        // Inicialmente mutado até interação
        bgMusic.muted = true;
        narration.muted = true;
    }
    
    // ========== EVENTOS DE INTERAÇÃO ==========
    function bindEvents() {
        const stage = document.getElementById('stage');
        const hintDiv = document.getElementById('tapHint');
        
        const startHandler = (e) => {
            e.preventDefault();
            if (!audioUnlocked) {
                unlockAudioAndStart();
            }
        };
        
        stage.addEventListener('click', startHandler);
        stage.addEventListener('touchstart', startHandler);
        if (hintDiv) {
            hintDiv.addEventListener('click', startHandler);
            hintDiv.addEventListener('touchstart', startHandler);
        }
        
        // Teclado também inicia
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                if (!audioUnlocked) unlockAudioAndStart();
            }
        });
        
        // Resize da tela
        window.addEventListener('resize', () => {
            resizeCanvas();
        });
    }
    
    // ========== INICIALIZAÇÃO ==========
    function init() {
        console.log("🎬 LOHRA STUDIO - TELA CHEIA | Sem bordas pretas | Logo topo central | Loop 18s");
        
        resizeCanvas();
        loadAllImages();
        prepareAudio();
        bindEvents();
        
        // Desenho inicial
        ctx.fillStyle = "#000000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Tentar mostrar imagem azul o mais rápido possível
        const checkImagesInterval = setInterval(() => {
            if (images.azul.complete) {
                drawImageFullCover(images.azul, ctx, canvas.width, canvas.height);
                clearInterval(checkImagesInterval);
            }
        }, 100);
        
        // Iniciar loop de animação
        animationId = requestAnimationFrame(animationLoop);
        
        // Mostrar hint após breve delay
        setTimeout(() => {
            const hint = document.getElementById('tapHint');
            if (hint && !audioUnlocked) {
                hint.style.display = 'flex';
            }
        }, 600);
    }
    
    init();
})();
</script>
</body>
</html>
