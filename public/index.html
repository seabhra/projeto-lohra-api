<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lohra · Tela Cheia · Fundo Borrado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            background: #000000;
            overflow: hidden;
            position: fixed;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
        }

        .fullscreen-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #stage {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            cursor: pointer;
        }

        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            display: block;
        }

        /* Canvas de fundo (blur) */
        #bgCanvas {
            z-index: 1;
        }

        /* Canvas principal (imagem nítida) */
        #mainCanvas {
            z-index: 2;
        }

        .brand-logo {
            position: absolute;
            top: 120px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            width: 280px;
            max-width: 55%;
            pointer-events: none;
            filter: drop-shadow(0 4px 20px rgba(0,0,0,0.5));
        }

        .brand-logo img {
            width: 100%;
            height: auto;
            display: block;
        }

        .tap-hint {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 14px 36px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1.5px;
            white-space: nowrap;
            z-index: 30;
            animation: pulseGlow 1.6s ease infinite;
            pointer-events: none;
            backdrop-filter: blur(16px);
            font-family: inherit;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.25);
        }

        @keyframes pulseGlow {
            0%, 100% { opacity: 0.7; transform: translateX(-50%) scale(1); }
            50% { opacity: 1; transform: translateX(-50%) scale(1.04); }
        }

        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>
<body>

<div class="fullscreen-container">
    <div id="stage">
        <canvas id="bgCanvas"></canvas>
        <canvas id="mainCanvas"></canvas>
        
        <div class="brand-logo">
            <img src="/images/marca.png" alt="LOHRA" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 400 120\'%3E%3Crect width=\'400\' height=\'120\' fill=\'%231a1a2e\'/%3E%3Ctext x=\'50%25\' y=\'50%25\' text-anchor=\'middle\' dy=\'.3em\' fill=\'white\' font-size=\'36\' font-family=\'Arial\' font-weight=\'bold\'%3ELOHRA%3C/text%3E%3C/svg%3E'">
        </div>
        
        <div id="tapHint" class="tap-hint">🎬 TOQUE PARA COMEÇAR 🎬</div>
    </div>
</div>

<script>
(function() {
    // =================================================================
    // LOHRA STUDIO - TELA CHEIA SEM BORDAS PRETAS
    // Técnica: fundo com a mesma imagem ampliada e desfocada (blur)
    // Imagem principal centralizada e nítida (contain)
    // Assim: sem preto nas laterais + peças completamente visíveis
    // =================================================================
    
    const bgCanvas = document.getElementById("bgCanvas");
    const mainCanvas = document.getElementById("mainCanvas");
    const bgCtx = bgCanvas.getContext("2d");
    const mainCtx = mainCanvas.getContext("2d");
    
    let cachedBlurCanvas = null; // Cache do fundo borrado para performance
    
    function resizeCanvases() {
        const w = window.innerWidth;
        const h = window.innerHeight;
        bgCanvas.width = w;
        bgCanvas.height = h;
        mainCanvas.width = w;
        mainCanvas.height = h;
    }
    
    // ========== IMAGENS DOS KITS ==========
    const images = {
        azul: new Image(),
        rosa: new Image(),
        verde: new Image()
    };
    
    const imageUrls = {
        azul: "https://projeto-lohra-api.vercel.app/api/media?type=image&file=kit_azul.jpeg",
        rosa: "https://projeto-lohra-api.vercel.app/api/media?type=image&file=kit_rosa.jpeg",
        verde: "https://projeto-lohra-api.vercel.app/api/media?type=image&file=kit_verde.jpeg"
    };
    
    // ========== ÁUDIOS ==========
    const bgMusic = new Audio("https://projeto-lohra-api.vercel.app/api/media?type=audio&file=heart.mp3");
    const narration = new Audio("https://projeto-lohra-api.vercel.app/api/media?type=audio&file=audio_narracao.ogg");
    
    bgMusic.loop = true;
    bgMusic.volume = 0.3;
    narration.volume = 0.85;
    
    let audioUnlocked = false;
    let imagesLoadedCount = 0;
    const totalImagesToLoad = 3;
    
    let globalProgress = 0;
    let playing = true;
    let animationId = null;
    let videoStartTime = null;
    const TOTAL_DURATION_SEC = 18.0;
    
    let currentImageKey = 'azul';
    
    // ========== FUNÇÃO PARA DESENHAR FUNDO BORRADO ==========
    // Cria uma versão ampliada (cover) e desfocada da imagem para preencher as laterais
    function drawBlurredBackground(img, ctx, targetW, targetH) {
        if (!img || !img.complete) return false;
        
        const imgW = img.naturalWidth;
        const imgH = img.naturalHeight;
        
        if (imgW === 0 || imgH === 0) return false;
        
        // Desenhar a imagem em COVER (preenche toda a tela, mesmo que corte)
        const scaleX = targetW / imgW;
        const scaleY = targetH / imgH;
        const scale = Math.max(scaleX, scaleY);
        
        const drawW = imgW * scale;
        const drawH = imgH * scale;
        const offsetX = (targetW - drawW) / 2;
        const offsetY = (targetH - drawH) / 2;
        
        // Desenhar em um canvas temporário para aplicar blur
        const tempCanvas = document.createElement('canvas');
        tempCanvas.width = targetW;
        tempCanvas.height = targetH;
        const tempCtx = tempCanvas.getContext('2d');
        
        tempCtx.drawImage(img, offsetX, offsetY, drawW, drawH);
        
        // Aplicar blur no contexto principal
        ctx.filter = 'blur(25px)';
        ctx.drawImage(tempCanvas, 0, 0, targetW, targetH);
        ctx.filter = 'none';
        
        return true;
    }
    
    // ========== FUNÇÃO PARA DESENHAR IMAGEM PRINCIPAL NÍTIDA (CONTAIN) ==========
    function drawSharpImage(img, ctx, targetW, targetH) {
        if (!img || !img.complete) return false;
        
        const imgW = img.naturalWidth;
        const imgH = img.naturalHeight;
        
        if (imgW === 0 || imgH === 0) return false;
        
        // CONTAIN: imagem inteira visível, centralizada
        const scaleX = targetW / imgW;
        const scaleY = targetH / imgH;
        const scale = Math.min(scaleX, scaleY);
        
        const drawW = imgW * scale;
        const drawH = imgH * scale;
        const offsetX = (targetW - drawW) / 2;
        const offsetY = (targetH - drawH) / 2;
        
        ctx.drawImage(img, offsetX, offsetY, drawW, drawH);
        return true;
    }
    
    // ========== DESENHO COMPLETO (FUNDO BORRADO + IMAGEM NÍTIDA) ==========
    function drawFullscreenWithBlur(progress) {
        const w = mainCanvas.width;
        const h = mainCanvas.height;
        
        if (!images.azul.complete || !images.rosa.complete || !images.verde.complete) {
            bgCtx.fillStyle = "#050505";
            bgCtx.fillRect(0, 0, w, h);
            mainCtx.fillStyle = "#050505";
            mainCtx.fillRect(0, 0, w, h);
            return;
        }
        
        // Determinar qual imagem exibir baseado no progresso
        const totalSegments = 9;
        let segmentIndex = Math.floor(progress * totalSegments);
        if (segmentIndex >= totalSegments) segmentIndex = totalSegments - 1;
        if (segmentIndex < 0) segmentIndex = 0;
        
        const imageOrder = ['azul', 'rosa', 'verde'];
        const cyclePosition = segmentIndex % 3;
        const currentImgKey = imageOrder[cyclePosition];
        const currentImg = images[currentImgKey];
        
        // Próxima imagem para crossfade
        let nextSegmentIndex = segmentIndex + 1;
        let nextImgKey = null;
        let nextImg = null;
        if (nextSegmentIndex < totalSegments) {
            nextImgKey = imageOrder[nextSegmentIndex % 3];
            nextImg = images[nextImgKey];
        }
        
        // Calcular blend factor (crossfade)
        const segmentDuration = 1.0 / totalSegments;
        const posInSegment = (progress % segmentDuration) / segmentDuration;
        let blend = 0;
        const fadeWidth = 0.22;
        if (posInSegment > (1 - fadeWidth)) {
            blend = (posInSegment - (1 - fadeWidth)) / fadeWidth;
            blend = Math.min(0.98, Math.max(0, blend));
        }
        
        // ===== 1. DESENHAR FUNDO BORRADO (imagem atual) =====
        if (currentImg && currentImg.complete) {
            drawBlurredBackground(currentImg, bgCtx, w, h);
        }
        
        // Se houver blend, desenhar também o fundo borrado da próxima imagem
        if (nextImg && blend > 0.05) {
            bgCtx.globalAlpha = blend;
            drawBlurredBackground(nextImg, bgCtx, w, h);
            bgCtx.globalAlpha = 1.0;
        }
        
        // ===== 2. DESENHAR IMAGEM PRINCIPAL NÍTIDA =====
        mainCtx.clearRect(0, 0, w, h);
        
        if (currentImg && currentImg.complete) {
            drawSharpImage(currentImg, mainCtx, w, h);
        }
        
        // Crossfade da imagem principal
        if (nextImg && blend > 0.05) {
            mainCtx.globalAlpha = blend;
            drawSharpImage(nextImg, mainCtx, w, h);
            mainCtx.globalAlpha = 1.0;
        }
        
        // Vinheta sutil na imagem principal para destacar a logo
        mainCtx.globalCompositeOperation = 'source-over';
        const gradient = mainCtx.createRadialGradient(w/2, h/2, w*0.3, w/2, h/2, w*0.85);
        gradient.addColorStop(0, 'rgba(0,0,0,0)');
        gradient.addColorStop(1, 'rgba(0,0,0,0.15)');
        mainCtx.fillStyle = gradient;
        mainCtx.fillRect(0, 0, w, h);
        mainCtx.globalAlpha = 1.0;
    }
    
    // ========== LOOP DE ANIMAÇÃO ==========
    function animationLoop(timestamp) {
        if (!playing) {
            animationId = requestAnimationFrame(animationLoop);
            return;
        }
        
        if (audioUnlocked) {
            if (videoStartTime === null) {
                videoStartTime = performance.now();
                globalProgress = 0;
            }
            
            const elapsedSeconds = (performance.now() - videoStartTime) / 1000;
            let newProgress = elapsedSeconds / TOTAL_DURATION_SEC;
            
            if (newProgress >= 1.0) {
                newProgress = newProgress % 1.0;
                videoStartTime = performance.now() - (newProgress * TOTAL_DURATION_SEC * 1000);
                console.log("🔄 Loop 18s completo");
            }
            
            globalProgress = newProgress;
            drawFullscreenWithBlur(globalProgress);
        } else {
            // Modo standby: mostrar primeira imagem
            if (images.azul.complete) {
                drawBlurredBackground(images.azul, bgCtx, bgCanvas.width, bgCanvas.height);
                mainCtx.clearRect(0, 0, mainCanvas.width, mainCanvas.height);
                drawSharpImage(images.azul, mainCtx, mainCanvas.width, mainCanvas.height);
                mainCtx.fillStyle = "rgba(0,0,0,0.1)";
                mainCtx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);
            }
        }
        
        animationId = requestAnimationFrame(animationLoop);
    }
    
    // ========== ÁUDIO E PLAYBACK ==========
    function startFullPlayback() {
        if (!audioUnlocked) return;
        
        videoStartTime = performance.now();
        globalProgress = 0;
        playing = true;
        
        bgMusic.currentTime = 0;
        narration.currentTime = 0;
        
        bgMusic.play().catch(e => console.warn("bgMusic:", e));
        narration.play().catch(e => console.warn("narration:", e));
        
        const hint = document.getElementById('tapHint');
        if (hint) hint.style.display = 'none';
        
        narration.onended = () => {
            if (audioUnlocked && narration) {
                narration.currentTime = 0;
                narration.play().catch(e => console.log("reinício narração"));
            }
        };
        
        bgMusic.onended = () => {
            if (audioUnlocked && bgMusic) {
                bgMusic.currentTime = 0;
                bgMusic.play().catch(e => console.log("reinício música"));
            }
        };
    }
    
    function unlockAudioAndStart() {
        if (audioUnlocked) return;
        
        audioUnlocked = true;
        bgMusic.muted = false;
        narration.muted = false;
        
        setTimeout(() => {
            startFullPlayback();
        }, 30);
    }
    
    // ========== CARREGAR IMAGENS ==========
    function loadAllImages() {
        const onImageLoad = () => {
            imagesLoadedCount++;
            if (imagesLoadedCount === totalImagesToLoad) {
                console.log("✅ Imagens carregadas - Modo blur ativado");
                if (!audioUnlocked && images.azul.complete) {
                    drawBlurredBackground(images.azul, bgCtx, bgCanvas.width, bgCanvas.height);
                    drawSharpImage(images.azul, mainCtx, mainCanvas.width, mainCanvas.height);
                }
            }
        };
        
        images.azul.onload = onImageLoad;
        images.rosa.onload = onImageLoad;
        images.verde.onload = onImageLoad;
        
        images.azul.onerror = () => { console.warn("Erro azul"); imagesLoadedCount++; onImageLoad(); };
        images.rosa.onerror = () => { console.warn("Erro rosa"); imagesLoadedCount++; onImageLoad(); };
        images.verde.onerror = () => { console.warn("Erro verde"); imagesLoadedCount++; onImageLoad(); };
        
        images.azul.src = imageUrls.azul;
        images.rosa.src = imageUrls.rosa;
        images.verde.src = imageUrls.verde;
    }
    
    function prepareAudio() {
        bgMusic.load();
        narration.load();
        bgMusic.muted = true;
        narration.muted = true;
    }
    
    function bindEvents() {
        const stage = document.getElementById('stage');
        const hintDiv = document.getElementById('tapHint');
        
        const startHandler = (e) => {
            e.preventDefault();
            if (!audioUnlocked) {
                unlockAudioAndStart();
            }
        };
        
        stage.addEventListener('click', startHandler);
        stage.addEventListener('touchstart', startHandler);
        if (hintDiv) {
            hintDiv.addEventListener('click', startHandler);
            hintDiv.addEventListener('touchstart', startHandler);
        }
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' || e.code === 'Enter') {
                if (!audioUnlocked) unlockAudioAndStart();
            }
        });
        
        window.addEventListener('resize', () => {
            resizeCanvases();
            if (images.azul.complete) {
                drawFullscreenWithBlur(globalProgress);
            }
        });
    }
    
    function init() {
        console.log("🎬 LOHRA - Tela cheia | Fundo borrado | Sem bordas pretas | Peças completas");
        
        resizeCanvases();
        loadAllImages();
        prepareAudio();
        bindEvents();
        
        bgCtx.fillStyle = "#000000";
        bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
        mainCtx.fillStyle = "#000000";
        mainCtx.fillRect(0, 0, mainCanvas.width, mainCanvas.height);
        
        animationId = requestAnimationFrame(animationLoop);
        
        setTimeout(() => {
            const hint = document.getElementById('tapHint');
            if (hint && !audioUnlocked) {
                hint.style.display = 'flex';
            }
        }, 600);
    }
    
    init();
})();
</script>
</body>
</html>
