<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lohra · Reels Narrado</title>

<style>
body {
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
}

#stage {
  width:360px;
  height:640px;
  position:relative;
  overflow:hidden;
}

canvas {
  position:absolute;
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<div id="stage">
  <canvas id="canvas"></canvas>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = 1080;
canvas.height = 1920;

const DURATION = 12;
let globalT = 0;
let last = null;

// 🎧 ÁUDIOS
const bg = new Audio("https://projeto-lohra-api.vercel.app/api/media?type=audio&file=heart.mp3");
const voice = new Audio("https://projeto-lohra-api.vercel.app/api/media?type=audio&file=audio_narracao.ogg");

bg.loop = true;
bg.volume = 0;
voice.volume = 0;

// 🖼️ IMAGENS
const blue = new Image();
const pink = new Image();
const green = new Image();

blue.src = "https://projeto-lohra-api.vercel.app/api/media?type=image&file=kit_azul.jpeg";
pink.src = "https://projeto-lohra-api.vercel.app/api/media?type=image&file=kit_rosa.jpeg";
green.src = "https://projeto-lohra-api.vercel.app/api/media?type=image&file=kit_verde.jpeg";

// easing
function ease(t){ return t*t*(3-2*t); }

// 🔊 fade de áudio
function fade(audio, target, dur){
  const steps = 30;
  let i = 0;
  const step = dur/steps;

  const interval = setInterval(()=>{
    i++;
    audio.volume = target*(i/steps);
    if(i>=steps) clearInterval(interval);
  }, step);
}

// 🎬 GANCHO
function hook(t){
  if(t < 0.12){
    ctx.fillStyle=`rgba(0,0,0,${1 - t*8})`;
    ctx.fillRect(0,0,1080,1920);

    ctx.fillStyle="#fff";
    ctx.font="bold 80px sans-serif";
    ctx.textAlign="center";
    ctx.fillText("Isso mudou tudo",540,900);
  }
}

// 🧠 LEGENDA
function caption(t){
  let txt="";
  if(t<0.25) txt="Antes: conexão física";
  else if(t<0.5) txt="Algo começou a mudar";
  else if(t<0.75) txt="Tudo migra pro digital";
  else txt="Agora: tudo online";

  ctx.fillStyle="rgba(0,0,0,0.6)";
  ctx.fillRect(0,1600,1080,200);

  ctx.fillStyle="#fff";
  ctx.font="bold 60px sans-serif";
  ctx.textAlign="center";
  ctx.fillText(txt,540,1720);
}

// 🎨 IMAGENS + TRANSIÇÃO
function draw(t){
  ctx.clearRect(0,0,1080,1920);

  ctx.globalAlpha=1;
  ctx.drawImage(blue,0,0,1080,1920);

  let mix=0;
  if(t<0.2) mix=0;
  else if(t>0.8) mix=1;
  else mix=ease((t-0.2)/0.6);

  ctx.globalAlpha=1-mix;
  ctx.drawImage(pink,0,0,1080,1920);

  ctx.globalAlpha=mix;
  ctx.drawImage(green,0,0,1080,1920);

  ctx.globalAlpha=1;

  if(mix>0.1 && mix<0.9){
    ctx.fillStyle=`rgba(79,195,247,${0.1 + mix*0.2})`;
    ctx.fillRect(0,0,1080,1920);
  }
}

// 🎧 CONTROLE DE ÁUDIO SINCRONIZADO
let audioStarted = false;

function syncAudio(t){
  const time = t * DURATION;

  if(!audioStarted && t > 0.03){
    bg.play().catch(()=>{});
    voice.play().catch(()=>{});

    fade(bg,0.25,2000);
    fade(voice,0.8,1200);

    audioStarted = true;
  }

  // fade final
  if(t > 0.9){
    bg.volume *= 0.96;
    voice.volume *= 0.94;
  }
}

// 🔄 LOOP
function loop(ts){
  if(!last) last = ts;

  const delta = ts - last;
  globalT += delta/(DURATION*1000);

  if(globalT>1) globalT=1;

  last = ts;

  draw(globalT);
  caption(globalT);
  hook(globalT);
  syncAudio(globalT);

  requestAnimationFrame(loop);
}

requestAnimationFrame(loop);
</script>

</body>
</html>
