<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lohra · Reels Loop</title>
    <style>
        body { margin:0; background:#000; display:flex; justify-content:center; align-items:center; height:100vh; overflow: hidden; }
        #stage { width:360px; height:640px; position:relative; overflow:hidden; background:#000; }
        canvas { position:absolute; width:100%; height:100%; }
        /* Aviso discreto caso o som esteja bloqueado */
        #unmute-hint {
            position: absolute; bottom: 20px; width: 100%; text-align: center;
            color: white; font-family: sans-serif; font-size: 12px; z-index: 20;
            text-shadow: 1px 1px 2px black; pointer-events: none; opacity: 0.7;
        }
    </style>
</head>
<body>

<div id="stage" onclick="unmute()">
    <div id="unmute-hint">Clique para ativar o som</div>
    <canvas id="canvas"></canvas>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

canvas.width = 1080;
canvas.height = 1920;

const DURATION = 12; 
let globalT = 0;
let last = null;

// --- ÁUDIOS ---
const bg = new Audio("https://projeto-lohra-api.vercel.app/api/media?type=audio&file=heart.mp3");
const voice = new Audio("https://projeto-lohra-api.vercel.app/api/media?type=audio&file=audio_narracao.ogg");

bg.loop = true; 
bg.muted = true; // Necessário para Autoplay
voice.muted = true; // Necessário para Autoplay

// --- IMAGENS ---
const images = [new Image(), new Image(), new Image()];
const srcList = [
    "https://projeto-lohra-api.vercel.app/api/media?type=image&file=kit_azul.jpeg",
    "https://projeto-lohra-api.vercel.app/api/media?type=image&file=kit_rosa.jpeg",
    "https://projeto-lohra-api.vercel.app/api/media?type=image&file=kit_verde.jpeg"
];

let loadedCount = 0;
images.forEach((img, i) => {
    img.onload = () => {
        loadedCount++;
        if(loadedCount === 3) start();
    };
    img.src = srcList[i];
});

function draw(t) {
    ctx.clearRect(0, 0, 1080, 1920);
    
    // Transições suaves em 3 fases
    if (t < 0.4) {
        let m = Math.min(1, Math.max(0, (t - 0.1) / 0.25)); 
        ctx.globalAlpha = 1;
        ctx.drawImage(images[0], 0, 0, 1080, 1920);
        ctx.globalAlpha = m;
        ctx.drawImage(images[1], 0, 0, 1080, 1920);
    } else if (t < 0.8) {
        let m = Math.min(1, Math.max(0, (t - 0.5) / 0.25));
        ctx.globalAlpha = 1;
        ctx.drawImage(images[1], 0, 0, 1080, 1920);
        ctx.globalAlpha = m;
        ctx.drawImage(images[2], 0, 0, 1080, 1920);
    } else {
        // Transição de volta para a primeira imagem (Loop suave)
        let m = Math.min(1, Math.max(0, (t - 0.85) / 0.15));
        ctx.globalAlpha = 1;
        ctx.drawImage(images[2], 0, 0, 1080, 1920);
        ctx.globalAlpha = m;
        ctx.drawImage(images[0], 0, 0, 1080, 1920);
    }
    ctx.globalAlpha = 1;
}

function unmute() {
    bg.muted = false;
    voice.muted = false;
    document.getElementById("unmute-hint").style.display = "none";
}

function start() {
    bg.play().catch(e => console.log("Autoplay com som bloqueado, iniciando mudo"));
    voice.play().catch(e => {});
    requestAnimationFrame(loop);
}

function loop(ts) {
    if (!last) last = ts;
    const delta = ts - last;
    last = ts;

    globalT += delta / (DURATION * 1000);

    // REINICIAR LOOP
    if (globalT >= 1) {
        globalT = 0;
        voice.currentTime = 0; // Reinicia a narração
        voice.play();
    }

    draw(globalT);
    requestAnimationFrame(loop);
}
</script>
</body>
</html>
