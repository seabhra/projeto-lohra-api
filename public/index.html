<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Lohra · Loop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .reels-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.5);
        }

        #stage {
            position: relative;
            width: 100%;
            aspect-ratio: 9 / 16;
            background: #000;
            overflow: hidden;
            cursor: pointer;
        }

        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            object-fit: cover;
        }

        /* MARCA PNG - ALTO CENTRALIZADA */
        .brand-logo {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            width: 45%;
            max-width: 200px;
            pointer-events: none;
        }

        .brand-logo img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
        }

        /* Tap hint inicial (desaparece após toque) */
        .tap-hint {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 14px;
            white-space: nowrap;
            z-index: 20;
            animation: pulse 1.5s ease infinite;
            pointer-events: none;
            font-weight: bold;
            backdrop-filter: blur(8px);
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.05); }
        }
    </style>
</head>
<body>

<div class="reels-container">
    <div id="stage">
        <canvas id="canvas"></canvas>
        
        <!-- MARCA PNG - ALTO CENTRALIZADA -->
        <div class="brand-logo">
            <img src="/images/marca.png" alt="Lohra">
        </div>
        
        <div id="tapHint" class="tap-hint">🎬 Toque para começar</div>
    </div>
</div>

<script>
(function() {
    // ================= CONFIGURAÇÕES =================
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    
    canvas.width = 1080;
    canvas.height = 1920;
    
    // ================= ÁUDIOS =================
    const bgMusic = new Audio("https://projeto-lohra-api.vercel.app/api/media?type=audio&file=heart.mp3");
    const narration = new Audio("https://projeto-lohra-api.vercel.app/api/media?type=audio&file=audio_narracao.ogg");
    
    bgMusic.loop = true;
    bgMusic.volume = 0.35;
    narration.volume = 0.8;
    
    // Estado do áudio
    let audioUnlocked = false;
    
    // ================= IMAGENS =================
    const images = {
        azul: new Image(),
        rosa: new Image(),
        verde: new Image()
    };
    
    const imageUrls = {
        azul: "https://projeto-lohra-api.vercel.app/api/media?type=image&file=kit_azul.jpeg",
        rosa: "https://projeto-lohra-api.vercel.app/api/media?type=image&file=kit_rosa.jpeg",
        verde: "https://projeto-lohra-api.vercel.app/api/media?type=image&file=kit_verde.jpeg"
    };
    
    let imagesLoaded = 0;
    const totalImages = 3;
    
    // ================= VARIÁVEIS DE CONTROLE =================
    let globalT = 0;
    let playing = true;
    let animationId = null;
    let lastTimestamp = null;
    let videoDuration = 15; // fallback, será atualizado pela narração
    
    // ================= FUNÇÃO EASING =================
    function easeInOutCubic(t) {
        return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    }
    
    // ================= DESENHO COM TRANSIÇÕES =================
    function drawScene(progress) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        if (!images.azul.complete || !images.rosa.complete || !images.verde.complete) {
            ctx.fillStyle = "#000";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            return;
        }
        
        // Fases do loop
        if (progress < 0.4) {
            const t = easeInOutCubic(progress / 0.4);
            ctx.globalAlpha = 1;
            ctx.drawImage(images.azul, 0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = t;
            ctx.drawImage(images.rosa, 0, 0, canvas.width, canvas.height);
        } 
        else if (progress < 0.7) {
            const t = easeInOutCubic((progress - 0.4) / 0.3);
            ctx.globalAlpha = 1;
            ctx.drawImage(images.rosa, 0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = t;
            ctx.drawImage(images.verde, 0, 0, canvas.width, canvas.height);
        } 
        else {
            const t = easeInOutCubic((progress - 0.7) / 0.3);
            ctx.globalAlpha = 1;
            ctx.drawImage(images.verde, 0, 0, canvas.width, canvas.height);
            ctx.globalAlpha = t;
            ctx.drawImage(images.azul, 0, 0, canvas.width, canvas.height);
        }
        
        ctx.globalAlpha = 1;
    }
    
    // ================= CONTROLE DE ÁUDIO =================
    function unlockAudio() {
        if (audioUnlocked) return;
        
        audioUnlocked = true;
        bgMusic.muted = false;
        narration.muted = false;
        
        bgMusic.play().catch(e => console.log("Erro música:", e));
        narration.play().catch(e => console.log("Erro narração:", e));
        
        const hint = document.getElementById('tapHint');
        if (hint) hint.style.display = "none";
    }
    
    function syncAudioPosition() {
        if (!audioUnlocked) return;
        
        const currentTime = globalT * videoDuration;
        
        if (!isNaN(narration.duration) && isFinite(narration.duration)) {
            const targetTime = currentTime % narration.duration;
            if (Math.abs(narration.currentTime - targetTime) > 0.3) {
                narration.currentTime = targetTime;
            }
        }
        
        if (!isNaN(bgMusic.duration) && isFinite(bgMusic.duration)) {
            const targetBg = currentTime % bgMusic.duration;
            if (Math.abs(bgMusic.currentTime - targetBg) > 0.5) {
                bgMusic.currentTime = targetBg;
            }
        }
    }
    
    // ================= LOOP PRINCIPAL =================
    function animationLoop(now) {
        if (!lastTimestamp) lastTimestamp = now;
        
        if (playing) {
            const delta = Math.min(100, now - lastTimestamp);
            globalT += delta / (videoDuration * 1000);
            
            if (globalT >= 1) {
                globalT = 0;
                if (audioUnlocked && narration) {
                    narration.currentTime = 0;
                    if (narration.paused) narration.play().catch(e => {});
                }
            }
            
            if (audioUnlocked) {
                syncAudioPosition();
            }
        }
        
        lastTimestamp = now;
        drawScene(globalT);
        
        animationId = requestAnimationFrame(animationLoop);
    }
    
    // ================= DETECTAR DURAÇÃO DA NARRAÇÃO =================
    function detectNarrationDuration() {
        narration.addEventListener('loadedmetadata', () => {
            if (narration.duration && !isNaN(narration.duration) && isFinite(narration.duration)) {
                videoDuration = narration.duration;
                console.log(`Duração: ${videoDuration}s`);
            }
        });
    }
    
    // ================= CARREGAR IMAGENS =================
    function loadImages() {
        images.azul.onload = () => { imagesLoaded++; checkReady(); };
        images.rosa.onload = () => { imagesLoaded++; checkReady(); };
        images.verde.onload = () => { imagesLoaded++; checkReady(); };
        
        images.azul.src = imageUrls.azul;
        images.rosa.src = imageUrls.rosa;
        images.verde.src = imageUrls.verde;
    }
    
    function checkReady() {
        if (imagesLoaded === totalImages) {
            console.log("Imagens carregadas");
        }
    }
    
    // ================= EVENTOS =================
    function setupEvents() {
        const stage = document.getElementById('stage');
        stage.addEventListener('click', (e) => {
            if (!audioUnlocked) unlockAudio();
            e.stopPropagation();
        });
    }
    
    // ================= INICIALIZAÇÃO =================
    function init() {
        loadImages();
        detectNarrationDuration();
        setupEvents();
        
        bgMusic.load();
        narration.load();
        
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        animationId = requestAnimationFrame(animationLoop);
        
        setTimeout(() => {
            if (!audioUnlocked) {
                document.getElementById('tapHint').style.display = "flex";
            }
        }, 500);
    }
    
    init();
})();
</script>
</body>
</html>
